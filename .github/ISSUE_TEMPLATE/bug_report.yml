name: Bug Report
description: Report a bug or unexpected behavior in PTA Tools
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible so we can reproduce and fix the issue.

  - type: input
    id: wordpress-version
    attributes:
      label: WordPress Version
      description: "Found in Dashboard > Updates or wp-admin footer"
      placeholder: "e.g. 6.7.1"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: PTA Tools Plugin Version
      description: "Found on PTA Tools main settings page or Plugins list"
      placeholder: "e.g. 3.43"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      description: "Found in Tools > Site Health > Info > Server"
      placeholder: "e.g. 8.3.29"
    validations:
      required: false

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - SSO (Single Sign-On)
        - Backup
        - Calendar (Embed)
        - Calendar (Sync / TEC Integration)
        - Emails
        - PTA Roles
        - OneDrive Media
        - Classes
        - Newsletter
        - Event Tickets
        - Auction
        - Product Fields
        - Donations
        - System (Logs / Schedules)
        - Dashboard / Main Settings
        - Multiple / Unsure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or relevant log output. Check PTA Tools > System > Logs for error details.
    validations:
      required: false

  - type: dropdown
    id: hosting
    attributes:
      label: Hosting Environment
      description: Where is your WordPress hosted?
      options:
        - Azure App Service
        - Other Cloud (AWS, GCP, etc.)
        - Shared Hosting
        - VPS / Dedicated Server
        - Local Development
        - Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (other plugins active, recent changes, WooCommerce version, etc.)
    validations:
      required: false
